version: '3.8'

services:
  backend:
    build: ../packages/backend
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      FRONTEND_URL: http://localhost
      BACKEND_URL: http://backend:3001
      TRUST_PROXY: "true"
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_PATH: /app/data/serialhub.db
    volumes:
      - serialhub-data:/app/data
      - serialhub-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build: ../packages/frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3001
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  serialhub-data:
  serialhub-logs:
